spring:
  application:
    name: seguradora-test

  datasource:
    url: jdbc:h2:mem:seguradora_test;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  
  flyway:
    enabled: false
  
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  
  data:
    redis:
      host: localhost
      port: 6379
  
  cache:
    type: simple

catalog:
  api:
    base-url: http://localhost:${wiremock.server.port:8081}

management:
  tracing:
    sampling:
      probability: 0.0
